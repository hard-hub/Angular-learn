@if(isAddingTask) {
    <app-new-task [userId]="userId" (cancel)="onClickingCancel()"/>
}
<section>
    <header>
        <h2>{{name}}</h2>
        <menu>
            <button (click)="onClickingAddTask()">Add Task</button>
        </menu>
    </header>
    <ul>
        @for (task of selectedUserTasks; track task.id) {
            <li>
                <app-task [task]="task" (complete)="onCompleteTask($event)"/>
            </li>
        }

            <app-task />

        <li>
            <app-task />
        </li>
        <li>
            <app-task />
        </li> -->
    </ul>
</section>
