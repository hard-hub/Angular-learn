<div>
    <button (click)="onSelectUser()">
        <img 
        [src]="imagePath" 
        [alt]="selectedUser.name" />

          you don't need to call the method, just reference it and it will work as it is a getter -->
        <!-- [src]="'assests/users/' + selectedUser.avatar"  -->
        <span>{{selectedUser.name}}</span>
    </button>
</div>
