<div>
     <button [class.active]="selected" (click)="onSelectUser()">
        <img 
        [src]="imagePath" 
        [alt]="name" />
         <!-- you don't need to use it like this, instead you can use a getter and also in the getter,
          you don't need to call the method, just reference it and it will work as it is a getter 
        [src]="'assests/users/' + selectedUser.avatar"   -->
        <span>{{name}}</span> 
    </button> 
</div>
